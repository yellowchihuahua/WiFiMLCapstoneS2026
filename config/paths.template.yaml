# Team template for project paths.
# Copy this to `config/paths.local.yaml` and edit the local file.
# Notebook loading is local-first, so you do not need to change this template each run.

shared:
  # Main shared directory on the course server (outside this git repo).
  data_root: "/share"

  # Primary ML input table (TSV/CSV/Parquet). Replace with your actual file.
  modeling_input: "/share/path/to/your_preprocessed_dataset.tsv"

repo:
  # Repo-relative output paths.
  results_dir: "results"
  metadata_dir: "results/metadata"
  modeling_outputs_dir: "results/modeling_outputs"
