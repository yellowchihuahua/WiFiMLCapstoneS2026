# Team template for project paths.
# Copy this to `config/paths.local.yaml` and edit the local file.
# Notebooks load local-first:
# 1) config/paths.local.yaml (if present)
# 2) this template as fallback

shared:
  # Main shared directory on the course server (outside this git repo).
  data_root: "/share"

  # Input used by ml_modeling notebook.
  modeling_input: "/share/path/to/your_preprocessed_dataset.parquet"

repo:

  # Modeling notebook outputs.
  modeling_runs_dir: "results/runs/modeling"
